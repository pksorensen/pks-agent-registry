name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-pr-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  id-token: write
  statuses: write   # deploy-staging posts commit statuses to the PR HEAD SHA

jobs:
  build:
    runs-on: [self-hosted, devcontainer-runner]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/agent-registry/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: src/agent-registry
      - name: Build
        run: go build ./...
        working-directory: src/agent-registry
      - name: Test
        run: go test ./...
        working-directory: src/agent-registry

  # ── Deploy to staging — runs after build green on release-please PRs ───────
  #
  # Mirrors the agentic-live-www pattern: only the release-please autorelease
  # PR triggers a staging deploy, and only on `synchronize` (you push to the
  # PR, or release-please bumps it). Uses the PR HEAD as the deploy ref, so
  # registry-uat.agentics.dk reflects exactly what will merge to main.
  deploy-staging:
    if: >-
      github.event.action == 'synchronize' &&
      contains(github.event.pull_request.labels.*.name, 'autorelease: pending')
    needs: [build]
    runs-on: [self-hosted, devcontainer-runner]
    environment: staging
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          persist-credentials: false

      - name: Mark PR check pending (deploy-staging)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state=pending \
            -f context=deploy-staging \
            -f description="Deploying to staging…" \
            -f target_url="$RUN_URL"

      - uses: pksorensen/pks-cli/.github/actions/coolify-deploy@main
        with:
          app-name: agent-registry
          environment: staging

      - name: Mark PR check success (deploy-staging)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state=success \
            -f context=deploy-staging \
            -f description="Staging deploy succeeded" \
            -f target_url="$RUN_URL"

      - name: Mark PR check failure (deploy-staging)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/$SHA" \
            -f state=failure \
            -f context=deploy-staging \
            -f description="Staging deploy failed" \
            -f target_url="$RUN_URL"

      - name: Comment staging result on PR
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          JOB_STATUS: ${{ job.status }}
          SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          if [ "$JOB_STATUS" = "success" ]; then
            ICON=":white_check_mark:"; LABEL="succeeded"
          else
            ICON=":x:"; LABEL="failed ($JOB_STATUS)"
          fi
          BODY="$ICON **deploy-staging** $LABEL — [run]($RUN_URL) · sha \`$SHA\`"
          gh pr comment "$PR_NUMBER" --repo "${{ github.repository }}" --body "$BODY"
