name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  build:
    runs-on: [self-hosted, devcontainer-runner]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/agent-registry/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: src/agent-registry
      - name: Build
        run: go build ./...
        working-directory: src/agent-registry
      - name: Test
        run: go test ./...
        working-directory: src/agent-registry

  # ── Deploy to staging — every push to main, gated on build green ───────────
  #
  # registry-uat.agentics.dk tracks the tip of main. Coolify's "auto-deploy on
  # push" should be DISABLED in the Coolify UI so this Actions job is the only
  # thing redeploying staging. The job is serialized per-branch via concurrency
  # so back-to-back pushes deploy in order rather than in parallel.
  deploy-staging:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [build]
    runs-on: [self-hosted, devcontainer-runner]
    environment: staging
    concurrency:
      group: deploy-staging-${{ github.ref }}
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: pksorensen/pks-cli/.github/actions/coolify-deploy@main
        with:
          app-name: agent-registry
          environment: staging
