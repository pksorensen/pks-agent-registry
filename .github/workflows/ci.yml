name: CI

on:
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: [self-hosted, devcontainer-runner]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: src/agent-registry/go.sum
      - name: Vet
        run: go vet ./...
        working-directory: src/agent-registry
      - name: Build
        run: go build ./...
        working-directory: src/agent-registry
      - name: Test
        run: go test ./...
        working-directory: src/agent-registry
