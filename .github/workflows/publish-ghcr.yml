name: Publish to GHCR

on:
  push:
    branches: [main]
  workflow_dispatch:

# Versioned releases (vX.Y.Z) are published from release.yml so the private
# registry and GHCR stay tag-aligned. This workflow only ships the rolling
# `latest` + `sha-` tags from main for non-release consumers.

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    env:
      IMAGE: ghcr.io/pksorensen/pks-agent-registry
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short,prefix=sha-

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Make package public
        if: github.ref == 'refs/heads/main'
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.request('PATCH /user/packages/container/pks-agent-registry/visibility', {
                visibility: 'public'
              });
              core.info('Package visibility set to public.');
            } catch (e) {
              core.warning(`Could not set package visibility automatically (${e.message}). Flip it once in the GitHub UI: Packages → pks-agent-registry → Package settings → Change visibility → Public.`);
            }
