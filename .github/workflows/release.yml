name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write   # required to push the release image to ghcr.io
  id-token: write   # required so the coolify-deploy runner can fetch a GH OIDC token

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build once with buildx, push the same digest to both the private registry
  # (consumed by Coolify) and GHCR (public). One build → identical vX.Y.Z tag
  # everywhere, so the two registries cannot drift on a release.
  build-push:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, devcontainer-runner]
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to private registry
        uses: pksorensen/pks-cli/.github/actions/registry-login@main
        with:
          registry: registry.kjeldager.io

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.kjeldager.io/agent-registry:${{ env.VERSION }}
            registry.kjeldager.io/agent-registry:latest
            ghcr.io/pksorensen/pks-agent-registry:v${{ env.VERSION }}
            ghcr.io/pksorensen/pks-agent-registry:${{ env.VERSION }}
            ghcr.io/pksorensen/pks-agent-registry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log out of private registry
        if: always()
        run: docker logout registry.kjeldager.io

      - name: Make GHCR package public
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.request('PATCH /user/packages/container/pks-agent-registry/visibility', {
                visibility: 'public'
              });
              core.info('Package visibility set to public.');
            } catch (e) {
              core.warning(`Could not set package visibility automatically (${e.message}).`);
            }

  # ── Deploy to production — fires when release-please cuts a real tag ───────
  deploy-production:
    needs: [release-please, build-push]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, devcontainer-runner]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pksorensen/pks-cli/.github/actions/coolify-deploy@main
        with:
          app-name: agent-registry
          environment: production
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ needs.release-please.outputs.version }}
          tag-name: ${{ needs.release-please.outputs.tag_name }}
