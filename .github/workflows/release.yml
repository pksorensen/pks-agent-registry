name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write   # required to push the release image to ghcr.io
  id-token: write   # required so the coolify-deploy runner can fetch a GH OIDC token

jobs:
  release-please:
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      version: ${{ steps.release.outputs.version }}
      tag_name: ${{ steps.release.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # Build once with buildx, push the same digest to registry.agentics.dk
  # (canonical, used by Coolify) and GHCR (public mirror). One build → identical
  # vX.Y.Z tag everywhere, so the two registries cannot drift on a release.
  build-push:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, devcontainer-runner]
    env:
      VERSION: ${{ needs.release-please.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry.agentics.dk
        uses: pksorensen/pks-cli/.github/actions/registry-login@main
        with:
          registry: registry.agentics.dk

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            registry.agentics.dk/agentics/pks-agent-registry:${{ env.VERSION }}
            registry.agentics.dk/agentics/pks-agent-registry:latest
            ghcr.io/pksorensen/pks-agent-registry:v${{ env.VERSION }}
            ghcr.io/pksorensen/pks-agent-registry:${{ env.VERSION }}
            ghcr.io/pksorensen/pks-agent-registry:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log out of registry.agentics.dk
        if: always()
        run: docker logout registry.agentics.dk

      - name: Make GHCR package public
        continue-on-error: true
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            try {
              await github.request('PATCH /user/packages/container/pks-agent-registry/visibility', {
                visibility: 'public'
              });
              core.info('Package visibility set to public.');
            } catch (e) {
              core.warning(`Could not set package visibility automatically (${e.message}).`);
            }

  # ── Deploy to production — fires when release-please cuts a real tag ───────
  deploy-production:
    needs: [release-please, build-push]
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: [self-hosted, devcontainer-runner]
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: pksorensen/pks-cli/.github/actions/coolify-deploy@main
        with:
          app-name: agent-registry
          environment: production
          github-token: ${{ secrets.GITHUB_TOKEN }}
          version: ${{ needs.release-please.outputs.version }}
          tag-name: ${{ needs.release-please.outputs.tag_name }}

  # Cross-compile the standalone agent-registry CLI/server binary (Go) for every
  # platform and publish it to the agentics.dk release store so
  # `curl agentics.dk/install/agent-registry.sh | bash` serves it without GitHub
  # access. The same binary is the admin CLI (`agent-registry owner add …`
  # against REGISTRY_REMOTE) and the server. Pure Go cross-compile → ubuntu-latest
  # builds all targets. The module lives under src/agent-registry/.
  build-agent-registry-cli:
    needs: release-please
    if: needs.release-please.outputs.release_created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write    # attach binaries to the GitHub release
      id-token: write     # mint a GitHub OIDC token to publish to agentics.dk (no PAT)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: src/agent-registry/go.sum

      - name: Build all platforms
        working-directory: src/agent-registry
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
        run: |
          mkdir -p dist
          for t in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64 windows/arm64; do
            os=${t%/*}; arch=${t#*/}
            name="agent-registry_${os}_${arch}"
            [ "$os" = windows ] && name="${name}.exe"
            echo "building $name"
            GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -trimpath \
              -ldflags "-s -w -X main.version=${VERSION}" -o "dist/${name}" .
          done
          ( cd dist && sha256sum agent-registry_* > "agent-registry_${VERSION}_checksums.txt" )
          ls -la dist

      - name: Attach binaries to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ needs.release-please.outputs.tag_name }}" \
            src/agent-registry/dist/* \
            --repo "${{ github.repository }}" \
            --clobber

      # Publish the binaries to the agentics.dk release store. Auth is an ephemeral
      # GitHub OIDC token (no PAT); agentics.dk verifies the audience + repo owner
      # and auto-registers the (repo, component) product on first publish.
      - name: Publish to agentics.dk release store
        continue-on-error: true # best-effort until the first release lands
        working-directory: src/agent-registry/dist
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          TAG: ${{ needs.release-please.outputs.tag_name }}
        run: |
          set -euo pipefail
          REC="agent-registry-${VERSION}"
          OIDC=$(curl -fsS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://agentics.dk/releases" | jq -r '.value')
          [ -n "$OIDC" ] && [ "$OIDC" != "null" ] || { echo "::error::failed to mint OIDC token"; exit 1; }
          curl -fsS -X POST -H "Authorization: Bearer ${OIDC}" -H "Content-Type: application/json" \
            -d "{\"component\":\"agent-registry\",\"semver\":\"${VERSION}\",\"tagName\":\"${TAG}\"}" \
            https://agentics.dk/api/releases >/dev/null
          for f in agent-registry_* *checksums.txt; do
            [ -f "$f" ] || continue
            echo "uploading $f"
            curl -fsS -X PUT -H "Authorization: Bearer ${OIDC}" \
              --data-binary @"$f" \
              "https://agentics.dk/api/releases/${REC}/attachments/$(basename "$f")"
            echo
          done
          curl -fsS -X PUT -H "Authorization: Bearer ${OIDC}" \
            "https://agentics.dk/api/releases/${REC}/publish" >/dev/null
          echo "published ${REC}"

      # Publish the /tools/agent-registry documentation from .agentics/tool on the
      # same release cut as the binary, so the public docs can never drift behind
      # the CLI. Same trusted-publishing model: an ephemeral OIDC token with
      # audience https://agentics.dk/docs, gated by the same (repo, component).
      - name: Publish tool docs to agentics.dk
        continue-on-error: true # best-effort until the docs route is deployed
        env:
          VERSION: ${{ needs.release-please.outputs.version }}
          DOCS_DIR: .agentics/tool
        run: |
          set -euo pipefail
          [ -d "$DOCS_DIR" ] || { echo "no $DOCS_DIR dir, skipping docs publish"; exit 0; }
          OIDC=$(curl -fsS -H "Authorization: Bearer ${ACTIONS_ID_TOKEN_REQUEST_TOKEN}" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://agentics.dk/docs" | jq -r '.value')
          [ -n "$OIDC" ] && [ "$OIDC" != "null" ] || { echo "::error::failed to mint docs OIDC token"; exit 1; }
          FILES="[]"
          while IFS= read -r -d '' f; do
            REL="${f#"$DOCS_DIR"/}"
            FILES=$(jq --arg p "$REL" --rawfile c "$f" '. + [{path:$p, content:$c}]' <<<"$FILES")
          done < <(find "$DOCS_DIR" -name '*.md' -print0)
          COUNT=$(jq 'length' <<<"$FILES")
          [ "$COUNT" -gt 0 ] || { echo "no .md docs found, skipping"; exit 0; }
          PAYLOAD=$(jq -n --arg component agent-registry --arg version "$VERSION" --argjson files "$FILES" \
            '{component:$component, version:$version, files:$files}')
          curl -fsS -X POST -H "Authorization: Bearer ${OIDC}" -H "Content-Type: application/json" \
            -d "$PAYLOAD" https://agentics.dk/api/tools/docs
          echo "published agent-registry docs v${VERSION} (${COUNT} files)"
